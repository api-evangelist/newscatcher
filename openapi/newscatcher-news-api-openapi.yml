  responses:
    AggregationCountResponse:
      description:
        A successful response containing aggregation count results that match
        the search criteria. If no matches, returns a failed aggregation
        response according to the defined schema.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/AggregationCountResponseDto"
              - $ref: "#/components/schemas/FailedAggregationCountResponseDto"

    AuthorsResponse:
      description:
        Authors search response containing a list of authors that match the
        search criteria. If no matches, returns a failed search response
        according to the defined schema.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/SearchResponseDto"
              - $ref: "#/components/schemas/FailedAuthorsResponseDto"

    SearchResponse:
      description:
        A successful response containing articles that match the search
        criteria. When `clustering_enabled` is `true`, returns a Clustered
        Articles Response. Otherwise, returns a Search Response.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/SearchResponseDto"
              - $ref: "#/components/schemas/ClusteredSearchResponseDto"

    BreakingNewsResponse:
      description:
        A successful response containing breaking news articles with additional
        breaking news event information.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BreakingNewsResponseDto"

    SearchByLinkResponse:
      description:
        A successful response containing articles that match the provided links
        or IDs.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SearchResponseDto"

    SourcesResponse:
      description:
        A successful response containing a list of news sources that match the
        specified criteria.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SourcesResponseDto"

    SubscriptionResponse:
      description:
        A successful response containing information about the current
        subscription plan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionResponseDto"

    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: "Invalid JSON in request body"
            status_code: 400
            status: "Bad request"

    UnauthorizedError:
      description: Unauthorized - Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message:
              "The 'x-api-token' parameter has an invalid value. Please provide
              a valid API key."
            status_code: 401
            status: "Unauthorized"

    ForbiddenError:
      description: Forbidden - Server refuses action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message:
              "Your plan request date range cannot be greater than 400 days"
            status_code: 403
            status: "Forbidden"

    RequestTimeoutError:
      description: Request timeout
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: "Request timed out after 30 seconds"
            status_code: 408
            status: "Request timeout"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: "Invalid date format"
            status_code: 422
            status: "Validation error"

    RateLimitError:
      description: Too many requests - Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: "Max API requests concurrency reached"
            status_code: 429
            status: "Too many requests"

    InternalServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: "Internal Server Error"

  schemas:
    BaseSearchResponseDto:
      title: Base Search Response
      description:
        The base response model containing common fields for search operations.
      required:
        - status
        - total_hits
        - page
        - total_pages
        - page_size
      type: object
      properties:
        status:
          title: Status
          description: The status of the response.
          type: string
        total_hits:
          title: Total Hits
          description:
            The total number of articles matching the search criteria.
          type: integer
        page:
          title: Page
          description: The current page number of the results.
          type: integer
        total_pages:
          title: Total Pages
          description:
            The total number of pages available for the given search criteria.
          type: integer
        page_size:
          title: Page Size
          description: The number of articles per page.
          type: integer

    ArticlesDto:
      title: Articles
      description: A list of articles matching the search criteria.
      type: array
      items:
        $ref: "#/components/schemas/ArticleEntity"
      default: []

    ClusteredArticlesDto:
      type: object
      required:
        - clusters_count
        - clusters
      properties:
        clusters_count:
          title: Clusters Count
          type: integer
          description: The number of clusters in the search results.
        clusters:
          type: array
          description: A list of clusters found in the search results.
          items:
            $ref: "#/components/schemas/ClusterEntity"

    UserInputDto:
      type: object
      description: The user input parameters for the request.
      additionalProperties: true

    AggregationCountResponseDto:
      title: Aggregation Response
      description: |
        The response model for a successful `Aggregation count` request. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null` or `undefined` if the data point is not presented or couldn't be extracted during processing.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - type: object
          properties:
            aggregations:
              title: Aggregations
              description:
                The aggregation results. Can be either a dictionary or a list of
                dictionaries.
              oneOf:
                - $ref: "#/components/schemas/AggregationItem"
                - type: array
                  items:
                    $ref: "#/components/schemas/AggregationItem"
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    AggregationItem:
      title: Aggregation Item
      description: |
        A single item in the aggregations array containing a collection of time-based article counts.
      required:
        - aggregation_count
      type: object
      properties:
        aggregation_count:
          type: array
          description:
            Array of time frames and their corresponding article counts
          items:
            $ref: "#/components/schemas/TimeFrameCount"

    TimeFrameCount:
      title: Time Frame Count
      description: |
        Represents the article count for a specific time frame.
      required:
        - time_frame
        - article_count
      type: object
      properties:
        time_frame:
          type: string
          format: date-time
          description:
            The timestamp for the aggregation period in format "YYYY-MM-DD
            HH:mm:ss"
          example: "2024-12-31 00:00:00"
        article_count:
          type: integer
          description: The number of articles published during this time frame
          example: 86

    FailedAggregationCountResponseDto:
      title: Failed Aggregation Response
      description: The response model for a failed `Aggregation count` request.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - type: object
          properties:
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    FailedAuthorsResponseDto:
      title: Failed Authors Search Response
      description: The response model for a failed `Authors` search request.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - type: object
          properties:
            articles:
              title: Articles
              description: An empty list of articles, as no matches were found.
              type: array
              items:
                type: object
              default: []
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    AllLinksDataItem:
      title: Link Data Item
      description: Detailed information about a link found in an article.
      required:
        - domain_url
        - link
        - text
      type: object
      properties:
        domain_url:
          title: Domain URL
          description: The domain of the linked URL.
          type: string
          example: "amazon.de"
        link:
          title: Link
          description: The complete URL of the link.
          type: string
          example: "https://www.amazon.de/s?k=Künstliche+Intelligenz"
        text:
          title: Text
          description: The anchor text of the link.
          type: string
          example: "KI Brillen"

    ArticleEntity:
      title: Article Object
      description:
        The data model representing a single article in the search results.
      required:
        - title
        - link
        - domain_url
        - full_domain_url
        - parent_url
        - rank
        - id
        - score
      type: object
      properties:
        title:
          title: Title
          description: The title of the article.
          type: string
        author:
          title: Author
          description: The primary author of the article.
          type: string
        authors:
          title: Authors
          description: A list of authors of the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
        journalists:
          title: Journalists
          description: A list of journalists associated with the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
            - type: "null"
        published_date:
          title: Published Date
          description: The date the article was published.
          type: string
        published_date_precision:
          title: Published Date Precision
          description: The precision of the published date.
          type: string
        updated_date:
          title: Updated Date
          description: The date the article was last updated.
          type: [string, "null"]
        updated_date_precision:
          title: Updated Date Precision
          description: The precision of the updated date.
          type: [string, "null"]
        parse_date:
          title: Parse Date
          description: The date the article was parsed.
          type: [string, "null"]
        link:
          title: Link
          description: The URL link to the article.
          type: string
        domain_url:
          title: Domain URL
          description: The domain URL of the article.
          type: string
        full_domain_url:
          title: Full Domain URL
          description: The full domain URL of the article.
          type: string
        name_source:
          title: Name Source
          description: The name of the source where the article was published.
          type: string
        is_headline:
          title: Is Headline
          description: Indicates if the article is a headline.
          type: boolean
        paid_content:
          title: Paid Content
          description:
            Indicates whether the source labels the article as paywalled or
            requiring a subscription for full access.
          type: boolean
        parent_url:
          title: Parent URL
          description: The categorical URL of the article.
          type: string
        country:
          title: Country
          description: The country where the article was published.
          type: string
        rights:
          title: Rights
          description: The rights information for the article.
          type: string
        rank:
          title: Rank
          description: The rank of the article's source.
          type: integer
        media:
          title: Media
          description: The media associated with the article.
          type: string
        language:
          title: Language
          description: The language in which the article is written.
          type: string
        description:
          title: Description
          description: A brief description of the article.
          type: string
        content:
          title: Content
          description: The content of the article.
          type: string
        title_translated_en:
          type: [string, "null"]
          description: |
            English translation of the article title. Available when using the `search_in` parameter with the `title_translated` option or by setting the `include_translation_fields` parameter to `true`.
        content_translated_en:
          type: [string, "null"]
          description: |
            English translation of the article content. Available when using the `search_in` parameter with the `content_translated` option or by setting the `include_translation_fields` parameter to `true`.
        word_count:
          title: Word Count
          description: The word count of the article.
          type: integer
          default: 0
        is_opinion:
          title: Is Opinion
          description: Indicates if the article is an opinion piece.
          type: boolean
        twitter_account:
          title: Twitter Account
          description: The Twitter account associated with the article.
          type: [string, "null"]
        all_links:
          title: All Links
          description: A list of all URLs mentioned in the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
          default: []
        all_domain_links:
          title: All Domain Links
          description: A list of all domain URLs mentioned in the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
          default: []
        all_links_data:
          title: All Links Data
          description: |
            Detailed information about all links mentioned in the article, including link URL, domain, and anchor text. Only present when the `all_links_text` parameter is used in the request.
          type: array
          items:
            $ref: "#/components/schemas/AllLinksDataItem"
          default: []
        nlp:
          $ref: "#/components/schemas/NlpDataEntity"
        id:
          title: ID
          description: The unique identifier for the article.
          type: string
        score:
          title: Score
          description: The relevance score of the article.
          type: number
        robots_compliant:
          title: Robots Compliant
          description: |
            True if the article content can be safely accessed according to the publisher's robots.txt rules; false otherwise.
          type: boolean
          example: true
        custom_tags:
          title: Custom Tags
          description:
            An object that contains custom tags associated with an article,
            where each key is a taxonomy name, and the value is an array of
            tags.
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          default: {}
        additional_domain_info:
          $ref: "#/components/schemas/AdditionalDomainInfoEntity"

    NlpDataEntity:
      type: object
      default: {}
      description: Natural Language Processing data for the article.
      properties:
        translation_summary:
          type: string
          description: |
            A brief AI-generated summary of the article's English translation.
        theme:
          type: string
          description: The themes or categories identified in the article.
        summary:
          type: string
          description: A brief AI-generated summary of the article content.
        sentiment:
          $ref: "#/components/schemas/SentimentScores"
        new_embedding:
          type: array
          items:
            type: number
            format: float
          description: |
            A dense 1024-dimensional vector representation of the article content, generated using the [multilingual-e5-large](https://huggingface.co/intfloat/multilingual-e5-large) model. Available for articles indexed before January 1, 2026.

            **Note**: The `new_embedding` field is only available in the `v3_nlp_embeddings` subscription plan.
        qwen_embedding:
          type: array
          items:
            type: number
            format: float
          description: |
            A dense 1024-dimensional vector representation of the article content, generated using the [Qwen3-Embedding-0.6B](https://huggingface.co/Qwen/Qwen3-Embedding) model. Available for articles indexed from January 1, 2026 onward. Embeddings are computed from a combination of the article `title` and `content` fields.

            **Note**: The `qwen_embedding` field is only available in the `v3_nlp_embeddings` subscription plan.
        ner_PER:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description:
            Named Entity Recognition for person entities (individuals' names).
        ner_ORG:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description:
            Named Entity Recognition for organization entities (company names,
            institutions).
        ner_MISC:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description:
            Named Entity Recognition for miscellaneous entities (events,
            nationalities, products).
        ner_LOC:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description:
            Named Entity Recognition for location entities (cities, countries,
            geographic features).
        translation_ner_PER:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description: |
            Named Entity Recognition for person entities (individuals' names) extracted from the English translation of the article.
        translation_ner_ORG:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description: |
            Named Entity Recognition for organization entities (company names, institutions) extracted from the English translation of the article.
        translation_ner_MISC:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description: |
            Named Entity Recognition for miscellaneous entities (events, nationalities, products) extracted from the English translation of the article.
        translation_ner_LOC:
          allOf:
            - $ref: "#/components/schemas/NamedEntityList"
          description: |
            Named Entity Recognition for location entities (cities, countries, geographic features) extracted from the English translation of the article.
        iptc_tags_name:
          type: array
          items:
            type: string
          description: |
            IPTC media topic taxonomy paths identified in the article content. Each path represents a hierarchical category following the IPTC standard.

            **Note**: The `iptc_tags_name` field is only available in the `v3_nlp_iptc_tags` subscription plan.
        iptc_tags_id:
          type: array
          items:
            type: string
          description: |
            IPTC media topic numeric codes identified in the article content. These codes correspond to the standardized IPTC media topic taxonomy.

            **Note**: The `iptc_tags_id` field is only available in the `v3_nlp_iptc_tags` subscription plan.
        iab_tags_name:
          type: array
          items:
            type: string
          description: |
            IAB content taxonomy paths identified in the article content. Each path represents a hierarchical category following the IAB content standard.

            **Note**: The `iab_tags_name` field is only available in the `v3_nlp_iptc_tags` subscription plan.

    SentimentScores:
      type: object
      description: Sentiment scores for the article's title and content.
      properties:
        title:
          type: number
          format: float
          description: The sentiment score for the article title (-1.0 to 1.0).
        content:
          type: number
          format: float
          description:
            The sentiment score for the article content (-1.0 to 1.0).

    NamedEntityList:
      type: array
      description: A list of named entities identified in the article.
      items:
        type: object
        properties:
          entity_name:
            type: string
            description: The name of the entity identified in the article.
          count:
            type: integer
            description: The number of times this entity appears in the article.

    AdditionalDomainInfoEntity:
      title: Additional Domain Info
      description: Additional information about the domain of the article.
      type: object
      properties:
        is_news_domain:
          title: Is News Domain
          description: Indicates whether the domain is a news domain.
          type: boolean
        news_type:
          title: News Type
          description: The type of news content provided by the domain.
          type: string
        news_domain_type:
          title: News Domain Type
          description: The type of news domain.
          type: string
      example:
        is_news_domain: true
        news_type: "News and Blogs"
        news_domain_type: "Original Content"

    ClusteredSearchResponseDto:
      title: Clustered Articles Response
      description: |
        The response model when clustering is enabled, grouping similar articles into clusters. Applies to the `Search` and `Latest headlines` requests. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null` or `undefined` if the data point is not presented or couldn't be extracted during processing.
        - To access article properties in the `articles` response array, 
        use array index notation. For example, `articles[n].title`, where `n` 
        is the zero-based index of the article object (0, 1, 2, etc.).
        - The `nlp` property within the article object `articles[n].nlp` 
        is only available with NLP-enabled subscription plans.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - $ref: "#/components/schemas/ClusteredArticlesDto"
        - type: object
          properties:
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    ClusterEntity:
      title: Cluster Entity
      description: The data model representing a single cluster of articles.
      required:
        - cluster_id
        - cluster_size
        - articles
      type: object
      properties:
        cluster_id:
          title: Cluster Id
          description: The unique identifier for the cluster.
          type: string
        cluster_size:
          title: Cluster Size
          description: The number of articles in the cluster.
          type: integer
        articles:
          title: Articles
          description: A list of articles in the cluster.
          type: array
          items:
            $ref: "#/components/schemas/ArticleEntity"

    SearchResponseDto:
      title: Search Response
      description: |
        The response model for the search requests applies to the `Search`, `Latest Headlines`, `Search by link`, and `Authors` endpoints. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null` or `undefined` if the data point is not presented or couldn't be extracted during processing.
        - To access article properties in the `articles` response array, use array index notation. For example, `articles[n].title`, where `n` is the zero-based index of the article object (0, 1, 2, etc.).
        - The `nlp` property within the article object `articles[n].nlp` is only available with NLP-enabled subscription plans.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - type: object
          properties:
            articles:
              $ref: "#/components/schemas/ArticlesDto"
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    BreakingNewsResponseDto:
      title: Breaking News Response
      description: |
        The response model for the breaking news requests. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null` or `undefined` if the data point is not presented or couldn't be extracted during processing.
        - To access article properties in the `articles` response array, use array index notation. For example, `articles[n].title`, where `n` is the zero-based index of the article object (0, 1, 2, etc.).
        - The `nlp` property within the article object `articles[n].nlp` is only available with NLP-enabled subscription plans.
      allOf:
        - $ref: "#/components/schemas/BaseSearchResponseDto"
        - type: object
          properties:
            breaking_news_events:
              title: Breaking News Events
              description:
                A list of breaking news events, each containing relevant
                articles.
              type: array
              items:
                $ref: "#/components/schemas/BreakingNewsEventEntity"
              default: []
            user_input:
              $ref: "#/components/schemas/UserInputDto"

    BreakingNewsEventEntity:
      title: Breaking News Event Object
      description: |
        The data model representing a breaking news event with its associated articles.
      required:
        - event_id
        - articles_count
        - articles
      type: object
      properties:
        event_id:
          title: Event ID
          description: Unique identifier for the breaking news event/cluster.
          type: string
        articles_count:
          title: Articles Count
          description: Number of articles in this breaking news cluster.
          type: integer
        articles:
          title: Articles
          description: The articles associated with this breaking news event.
          type: array
          items:
            $ref: "#/components/schemas/BreakingNewsArticleEntity"
          default: []

    BreakingNewsArticleEntity:
      title: Breaking News Article Object
      description: |
        The data model representing a single article in the `Breaking news` search results.
      required:
        - title
        - link
        - domain_url
        - full_domain_url
        - parent_url
        - rank
        - id
        - score
      type: object
      properties:
        title:
          title: Title
          description: The title of the article.
          type: string
        author:
          title: Author
          description: The primary author of the article.
          type: string
        authors:
          title: Authors
          description: A list of authors of the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
        journalists:
          title: Journalists
          description: A list of journalists associated with the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
            - type: "null"
        published_date:
          title: Published Date
          description: The date the article was published.
          type: string
        published_date_precision:
          title: Published Date Precision
          description: The precision of the published date.
          type: string
        updated_date:
          title: Updated Date
          description: The date the article was last updated.
          type: [string, "null"]
        updated_date_precision:
          title: Updated Date Precision
          description: The precision of the updated date.
          type: [string, "null"]
        parse_date:
          title: Parse Date
          description: The date the article was parsed.
          type: [string, "null"]
        link:
          title: Link
          description: The URL link to the article.
          type: string
        domain_url:
          title: Domain URL
          description: The domain URL of the article.
          type: string
        full_domain_url:
          title: Full Domain URL
          description: The full domain URL of the article.
          type: string
        name_source:
          title: Name Source
          description: The name of the source where the article was published.
          type: string
        is_headline:
          title: Is Headline
          description: Indicates if the article is a headline.
          type: boolean
        paid_content:
          title: Paid Content
          description:
            Indicates whether the source labels the article as paywalled or
            requiring a subscription for full access.
          type: boolean
        parent_url:
          title: Parent URL
          description: The categorical URL of the article.
          type: string
        country:
          title: Country
          description: The country where the article was published.
          type: string
        rights:
          title: Rights
          description: The rights information for the article.
          type: string
        rank:
          title: Rank
          description: The rank of the article's source.
          type: integer
        media:
          title: Media
          description: The media associated with the article.
          type: string
        language:
          title: Language
          description: The language in which the article is written.
          type: string
        description:
          title: Description
          description: A brief description of the article.
          type: string
        content:
          title: Content
          description: The content of the article.
          type: string
        title_translated_en:
          type: [string, "null"]
          description: |
            English translation of the article title. Available when setting the `include_translation_fields` parameter to `true`.
        content_translated_en:
          type: [string, "null"]
          description: |
            English translation of the article content. Available when setting the `include_translation_fields` parameter to `true`.
        word_count:
          title: Word Count
          description: The word count of the article.
          type: integer
          default: 0
        is_opinion:
          title: Is Opinion
          description: Indicates if the article is an opinion piece.
          type: boolean
        twitter_account:
          title: Twitter Account
          description: The Twitter account associated with the article.
          type: [string, "null"]
        all_links:
          title: All Links
          description: A list of all URLs mentioned in the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
          default: []
        all_domain_links:
          title: All Domain Links
          description: A list of all domain URLs mentioned in the article.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
          default: []
        nlp:
          $ref: "#/components/schemas/NlpDataEntity"
        id:
          title: ID
          description: The unique identifier for the article.
          type: string
        score:
          title: Score
          description: The relevance score of the article.
          type: number

    SourcesResponseDto:
      title: Sources Response
      description: |
        The response model for a successful `Sources` request retrieving news sources matching the specified criteria. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null` or `undefined` if the data point is not presented or couldn't be extracted during processing.
      required:
        - message
        - sources
        - user_input
      type: object
      properties:
        message:
          title: Message
          description: A message indicating the result of the request.
          type: string
        sources:
          title: Sources
          description: A list of news sources that match the specified criteria.
          type: array
          items:
            anyOf:
              - $ref: "#/components/schemas/SourceInfo"
              - type: string
        user_input:
          title: User Input
          description: The user input parameters for the request.
          type: object

    SourceInfo:
      title: Source Info
      description: The data model for information about a news source.
      required:
        - domain_url
      type: object
      properties:
        name_source:
          title: Name Source
          description: The name of the news source.
          type: string
        domain_url:
          title: Domain Url
          description: The domain URL of the news source.
          type: string
        logo:
          title: Logo
          description: The logo of the news source.
          type: string
        additional_info:
          $ref: "#/components/schemas/AdditionalSourceInfo"

    AdditionalSourceInfo:
      title: Additional Source Info
      description:
        The data model for additional information about a news source.
      type: object
      properties:
        nb_articles_for_7d:
          title: Nb Articles For 7D
          description:
            The number of articles published by the source in the last seven
            days.
          type: integer
        country:
          title: Country
          description: The country of origin of the news source.
          type: string
        rank:
          title: Rank
          description: The SEO rank of the news source.
          type: integer
        is_news_domain:
          title: Is News Domain
          description: Indicates whether the source is a news domain.
          type: boolean
        news_domain_type:
          title: News Domain Type
          description: The type of news domain.
          type: string
        news_type:
          title: News Type
          description: The category of news provided by the source.
          type: string
        robots_compliant:
          title: Robots Compliant
          description: |
            Percentage of domain articles that comply with robots.txt scraping rules (0-100%).
          type: string
          example: "100%"
      example:
        nb_articles_for_7d: 153
        country: "US"
        rank: 117
        is_news_domain: true
        news_domain_type: "Original Content"
        news_type: "General News Outlets"
        robots_compliant: "100%"

    SubscriptionResponseDto:
      title: Subscription Response
      description: |
        Response model for a successful `Subscription` request retrieving plan information. Response field behavior:
        - Required fields are guaranteed to be present and non-null. 
        - Optional fields may be `null`/`undefined` if the data couldn't 
        be extracted during processing.
      required:
        - active
        - concurrent_calls
        - plan
        - plan_calls
        - remaining_calls
        - historical_days
      type: object
      properties:
        active:
          title: Active
          description: Indicates whether the subscription is currently active.
          type: boolean
        concurrent_calls:
          title: Concurrent calls
          description:
            The number of API calls allowed per second allowed in the current
            plan.
          type: integer
        plan:
          title: Plan Name
          description: The name of the subscription plan.
          type: string
        plan_calls:
          title: Plan Calls
          description:
            The total number of API calls assigned to the current subscription.
          type: integer
        remaining_calls:
          title: Remaining Calls
          description:
            The number of API calls remaining for the current subscription
            period.
          type: integer
        historical_days:
          title: Historical Days
          description:
            The number of historical days accessible under the current
            subscription plan.
          type: integer

    Error:
      type: object
      properties:
        message:
          type: string
          description: A detailed description of the error.
        status_code:
          type: integer
          description: The HTTP status code of the error.
        status:
          type: string
          description: A short description of the status code.
      required:
        - message
        - status_code
        - status

    Q:
      type: string
      description: |
        The keyword(s) to search for in articles. Query syntax supports logical operators (`AND`, `OR`, `NOT`) and wildcards:

        - For exact phrases, use escaped quotes: `\"technology news\"`
        - Use `*` for wildcards: `technolog*` (cannot start with `*`)
        - Use `+` to include and `-` to exclude: `+Apple`, `-Google`
        - Boolean operators: `technology AND (Apple OR Microsoft) NOT Google`
        - Forbidden characters: `[` `]` `/` `\\` `:` `^` and URL-encoded equivalents

        **Note:** The API automatically inserts `AND` operators between standalone terms, so strings like `"machine learning"` become `"machine AND learning"`. To avoid syntax errors (especially in queries with `OR` operators), use literal escape `"\"machine learning\""`.

        For detailed syntax rules, see [Advanced querying](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/advanced-querying).
      example: '"supply chain" AND Amazon NOT China'

    Lang:
      oneOf:
        - type: string
          example: "en,es"
        - type: array
          items:
            type: string
          example: ["en", "es"]
      description: |
        The language(s) of the search. The only accepted format is the two-letter [ISO 639-1](https://en.wikipedia.org/wiki/ISO_639-1) code. To select multiple languages, use a comma-separated string or an array of strings.

        To learn more, see [Enumerated parameters > Language](https://www.newscatcherapi.com/docs/news-api/api-reference/enumerated-parameters#language-lang-and-not-lang).

    NotLang:
      oneOf:
        - type: string
          example: "fr,de"
        - type: array
          items:
            type: string
          example: ["fr", "de"]
      description: |
        The language(s) to exclude from the search. The accepted format is the two-letter [ISO 639-1](https://en.wikipedia.org/wiki/ISO_639-1) code. To exclude multiple languages, use a comma-separated string or an array of strings.

        To learn more, see [Enumerated parameters > Language](https://www.newscatcherapi.com/docs/news-api/api-reference/enumerated-parameters#language-lang-and-not-lang).

    SearchIn:
      type: string
      default: title_content
      description: |
        The article fields to search in. Use a comma-separated string for multiple options, with a maximum of 2 in a single request.

        Available options: 
        - Standard fields: `title`, `content`, `summary`, `title_content`
        - Translation fields: `title_translated`, `content_translated`, `summary_translated`, `title_content_translated`

      example: title_content, title_content_translated

    IncludeTranslationFields:
      type: boolean
      default: false
      description: |
        If true, includes English translation fields in the response (`title_translated_en`, `content_translated_en`, and NLP translation fields).
      example: true

    Countries:
      oneOf:
        - type: string
          example: "US,CA"
        - type: array
          items:
            type: string
          example: ["US", "CA"]
      description: |
        The countries where the news publisher is located. The accepted format is the two-letter [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) code. To select multiple countries, use a comma-separated string or an array of strings.

        To learn more, see [Enumerated parameters > Country](https://www.newscatcherapi.com/docs/news-api/api-reference/enumerated-parameters#country-country-and-not-country).

    NotCountries:
      oneOf:
        - type: string
          example: "UK,FR"
        - type: array
          items:
            type: string
          example: ["UK", "FR"]
      description: |
        The publisher location countries to exclude from the search. The accepted format is the two-letter [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) code. To exclude multiple countries, use a comma-separated string or an array of strings.

        To learn more, see [Enumerated parameters > Country](https://www.newscatcherapi.com/docs/news-api/api-reference/enumerated-parameters#country-country-and-not-country).

    Sources:
      oneOf:
        - type: string
          example: "nytimes.com, theguardian.com"
        - type: array
          items:
            type: string
          example: ["nytimes.com", "theguardian.com"]
      description: |
        One or more news sources to narrow down the search. The format must be a domain URL. Subdomains, such as `finance.yahoo.com`, are also acceptable. To specify multiple sources, use a comma-separated string or an array of strings.

    NotSources:
      oneOf:
        - type: string
          example: "cnn.com, wsj.com"
        - type: array
          items:
            type: string
          example: ["cnn.com", "wsj.com"]
      description: |
        The news sources to exclude from the search. To exclude multiple sources, use a comma-separated string or an array of strings.

    PredefinedSources:
      oneOf:
        - type: string
          example: "top 50 US, top 20 GB"
        - type: array
          items:
            type: string
          example: ["top 50 US", "top 20 GB"]
      description: |
        Predefined top news sources per country. 

        Format: start with the word `top`, followed by the number of desired sources, and then the two-letter country code [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2). 

        Multiple countries with the number of top sources can be specified as a comma-separated string or an array of strings.

    SourceName:
      oneOf:
        - type: string
          example: "sport, tech"
        - type: array
          items:
            type: string
          example: ["sport", "tech"]
      description: |
        Specifies terms to search within the source names. To specify multiple terms, use a comma-separated string or an array of strings.

        **Note**: The search does not require an exact match and returns all sources that include the specified terms anywhere in their names. You can use any word, phrase, or outlet name, such as `"sport"`, or `"new york times"`. For example, using `"sport"` as a term returns sources like `"Motorsport"`, `"Dot Esport"`, and `"Tuttosport"`.

    ParentUrl:
      oneOf:
        - type: string
          example: "wsj.com/politics,wsj.com/tech"
        - type: array
          items:
            type: string
          example: ["wsj.com/politics", "wsj.com/tech"]
      description: |
        The categorical URL(s) to filter your search. To filter your search by multiple categorical URLs, use a comma-separated string or an array of strings.

    RankedOnly:
      type: boolean
      default: true
      description: |
        If true, limits the search to sources ranked in the top 1 million online websites. If false, includes unranked sources which are assigned a rank of 999999.
      example: true

    FromRank:
      type: integer
      minimum: 1
      maximum: 999999
      default: 1
      format: int32
      description: |
        The lowest boundary of the rank of a news website to filter by. A lower rank indicates a more popular source.
      example: 100

    ToRank:
      type: integer
      minimum: 1
      maximum: 999999
      default: 999999
      format: int32
      description: |
        The highest boundary of the rank of a news website to filter by. A lower rank indicates a more popular source.
      example: 100

    SortBy:
      type: string
      enum:
        - relevancy
        - date
        - rank
      default: relevancy
      description: |
        The sorting order of the results. Possible values are:
        - `relevancy`: The most relevant results first.
        - `date`: The most recently published results first.
        - `rank`: The results from the highest-ranked sources first.
      example: "date"

    PageSize:
      type: integer
      minimum: 1
      maximum: 1000
      default: 100
      description: |
        The number of articles to return per page.
      example: 50

    Page:
      type: integer
      minimum: 1
      default: 1
      description: |
        The page number to scroll through the results. Use for pagination, as a single API response can return up to 1,000 articles. 

        For details, see [Retrieve large datasets](https://www.newscatcherapi.com/docs/news-api/how-to/retrieve-more-than-10k-articles)
      example: 2

    From:
      oneOf:
        - type: string
          format: date-time
          example: 2024-07-01T00:00:00
        - type: string
          example: 1 day ago
      default: 7 days ago
      description: |
        The starting point in time to search from. Accepts date-time strings in ISO 8601 format and plain text strings. The default time zone is UTC. 

        Formats with examples:
        - YYYY-mm-ddTHH:MM:SS: `2024-07-01T00:00:00`
        - YYYY-MM-dd: `2024-07-01`
        - YYYY/mm/dd HH:MM:SS: `2024/07/01 00:00:00`
        - YYYY/mm/dd: `2024/07/01`
        - English phrases: `7 day ago`, `today`
        - Duration shorthand: `7d`, `30d`, `24h`, `48h`

        **Note**: By default, applied to the publication date of the article. To use the article's parse date instead, set the `by_parse_date` parameter to `true`.
      example: 2021/01/01

    To:
      oneOf:
        - type: string
          example: "now"
        - type: string
          format: date-time
          example: 2024-01-01T00:00:00
      description: |
        The ending point in time to search up to. Accepts date-time strings in ISO 8601 format and plain text strings. The default time zone is UTC. 

        Formats with examples:
        - YYYY-mm-ddTHH:MM:SS: `2024-07-01T00:00:00`
        - YYYY-MM-dd: `2024-07-01`
        - YYYY/mm/dd HH:MM:SS: `2024/07/01 00:00:00`
        - YYYY/mm/dd: `2024/07/01`
        - English phrases: `1 day ago`, `now`
        - Duration shorthand: `7d`, `30d`, `24h`, `48h`

        **Note**: By default, applied to the publication date of the article. To use the article's parse date instead, set the `by_parse_date` parameter to `true`.
      default: "now"

    PublishedDatePrecision:
      type: string
      description: |
        The precision of the published date. There are three types:
        - `full`: The day and time of an article is correctly identified with the appropriate timezone.
        - `timezone unknown`: The day and time of an article is correctly identified without timezone.
        - `date`: Only the day is identified without an exact time.
      example: full

    ByParseDate:
      type: boolean
      default: false
      description: |
        If true, the `from_` and `to_` parameters use article parse dates instead of published dates. Additionally, the `parse_date` variable is added to the output for each article object.
      example: true

    IsHeadline:
      type: boolean
      description: |
        If true, only returns articles that were posted on the home page of a given news domain.
      example: true

    AllLinks:
      oneOf:
        - type: string
          example:
            "https://aiindex.stanford.edu/report/, https://www.stateof.ai/"
        - type: array
          items:
            type: string
          example:
            ["https://aiindex.stanford.edu/report/", "https://www.stateof.ai/"]
      description: |
        The complete URL(s) mentioned in the article. For multiple URLs, use a comma-separated string or an array of strings.

        For more details, see [Search by URL](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-url).

    AllDomainLinks:
      oneOf:
        - type: string
          example: "who.int, nih.gov"
        - type: array
          items:
            type: string
          example: ["who.int", "nih.gov"]
      description: |
        The domain(s) mentioned in the article. For multiple domains, use a comma-separated string or an array of strings.

        For more details, see [Search by URL](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-url).

    AllLinksText:
      oneOf:
        - type: string
          example: "Nvidia, Tesla"
        - type: array
          items:
            type: string
          example: ["Nvidia", "Tesla"]
      description: |
        The text content of links mentioned in the article. Searches for links where the anchor text contains the specified terms. For multiple terms, use a comma-separated string or an array of strings.

        **Note**: When this parameter is used, the response includes the `all_links_data` field with detailed link information.

        For more details, see [Search by URL](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-url).

    AuthorName:
      type: string
      description: |
        The name of the author to search for. This parameter returns exact matches only.
      example: Jane Smith

    NotAuthorName:
      oneOf:
        - type: string
          example: "John Doe, Jane Doe"
        - type: array
          items:
            type: string
          example: ["John Doe", "Jane Doe"]
      description: |
        The list of author names to exclude from your search. To exclude articles by specific authors, use a comma-separated string or an array of strings.

    WordCountMin:
      type: integer
      minimum: 0
      description: |
        The minimum number of words an article must contain. To be used for avoiding articles with small content.
      example: 300

    WordCountMax:
      type: integer
      minimum: 0
      description: |
        The maximum number of words an article can contain. 
        To be used for avoiding articles with large content.
      example: 1000

    ClusteringEnabled:
      type: boolean
      default: false
      description: |
        Determines whether to group similar articles into clusters. If true, the API returns clustered results.

        To learn more, see [Clustering news articles](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/clustering-news-articles).
      example: true

    ClusteringVariable:
      type: string
      enum:
        - content
        - title
        - summary
      default: content
      deprecated: true
      description: |
        **Deprecated from January 1, 2026 onward.** For articles published on or after 2026-01-01, this parameter is ignored. Clustering always uses a combined `title + content` embedding generated by the Qwen3-Embedding-0.6B model, regardless of the value supplied.

        For articles published before 2026-01-01, this parameter remains functional and specifies which part of the article to use for clustering:
        - `content`: Uses the full article content (default).
        - `title`: Uses only the article title.
        - `summary`: Uses the article summary.

        To learn more, see [Clustering news articles](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/clustering-news-articles).
      example: content

    ClusteringThreshold:
      type: number
      format: float
      exclusiveMinimum: 0
      maximum: 1.0
      default: 0.7
      description: |
        Sets the similarity threshold for grouping articles into clusters. A lower value creates more inclusive clusters, while a higher value requires greater similarity between articles.

        For example:
        - `0.6`: Results in larger, more diverse clusters.
        - `0.7`: Balances cluster size and article similarity (default).
        - `0.8`: Creates smaller, tightly related clusters.

        To learn more, see [Clustering news articles](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/clustering-news-articles).
      example: 0.7

    IncludeNlpData:
      type: boolean
      default: false
      description: |
        If true, includes an NLP object for each article in the response. This object provides results of NLP analysis, including article theme, summary, sentiment, tags, and named entity recognition if available.

        **Note**: NLP data is only available for articles indexed from July 2023 onward. For articles indexed before July 2023, the `nlp` field is returned as an empty object `{}`.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: true

    HasNlp:
      type: boolean
      default: false
      description: |
        If true, filters results to include only articles that have NLP data.

        **Note**: NLP data is only available for articles indexed from July 2023 onward. Applying this filter to a date range that predates July 2023 returns zero results.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: true

    Theme:
      type: string
      example: "Finance,Tech"
      description: |
        Filters articles based on their general topic, as determined by NLP analysis. To select multiple themes, use a comma-separated string.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).

        Available options: `Business`, `Economics`, `Entertainment`, `Finance`, `Health`, `Politics`, `Science`, `Sports`, `Tech`, `Crime`, `Financial Crime`, `Lifestyle`, `Automotive`, `Travel`, `Weather`, `General`.

    NotTheme:
      type: string
      example: "Crime,Sports"
      description: |
        Inverse of the `theme` parameter. Excludes articles based on their general topic, as determined by NLP analysis. To exclude multiple themes, use a comma-separated string.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).

    OrgEntityName:
      type: string
      description: |
        Filters articles that mention specific organization names, as identified by NLP analysis. 

        - To specify multiple organizations, use `AND`, `OR`, `NOT` operators, and `\"` escape literals for exact matches. 
        - To search in translations, combine with the translation options of the `search_in` parameter (e.g., `title_content_translated`).

        To learn more, see [Search by entity](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-entity).
      example: '"Apple Inc" OR Microsoft'

    PerEntityName:
      type: string
      description: |
        Filters articles that mention specific person names, as identified by NLP analysis. 

        - To specify multiple names, use `AND`, `OR`, `NOT` operators, and `\"` escape literals for exact matches. 
        - To search in translations, combine with the translation options of the `search_in` parameter (e.g., `title_content_translated`).

        To learn more, see [Search by entity](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-entity).
      example: '"Elon Musk" OR "Jeff Bezos"'
    LocEntityName:
      type: string
      description: |
        Filters articles that mention specific location names, as identified by NLP analysis.

        - To specify multiple locations, use `AND`, `OR`, `NOT` operators, and `\"` escape literals for exact matches. 
        - To search in translations, combine with the translation options of the `search_in` parameter (e.g., `title_content_translated`).

        To learn more, see [Search by entity](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-entity).
      example: '"San Francisco" OR "New York City"'

    MiscEntityName:
      type: string
      description: |
        Filters articles that mention other named entities not falling under person, organization, or location categories. Includes events, nationalities, products, works of art, and more.

        - To specify multiple entities, use `AND`, `OR`, `NOT` operators, and `\"` escape literals for exact matches. 
        - To search in translations, combine with the translation options of the `search_in` parameter (e.g., `title_content_translated`).

        To learn more, see [Search by entity](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-entity).
      example: 'AWS OR "Microsoft Azure"'

    TitleSentimentMin:
      type: number
      format: float
      minimum: -1.0
      maximum: 1.0
      description: |
        Filters articles based on the minimum sentiment score of their titles.

        Range is `-1.0` to `1.0`, where:
        - Negative values indicate negative sentiment.
        - Positive values indicate positive sentiment.
        - Values close to 0 indicate neutral sentiment.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: -0.5

    TitleSentimentMax:
      type: number
      format: float
      minimum: -1.0
      maximum: 1.0
      description: |
        Filters articles based on the maximum sentiment score of their titles.

        Range is `-1.0` to `1.0`, where:
        - Negative values indicate negative sentiment.
        - Positive values indicate positive sentiment.
        - Values close to 0 indicate neutral sentiment.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: 0.5

    ContentSentimentMin:
      type: number
      format: float
      minimum: -1.0
      maximum: 1.0
      description: |
        Filters articles based on the minimum sentiment score of their content.

        Range is `-1.0` to `1.0`, where:
        - Negative values indicate negative sentiment.
        - Positive values indicate positive sentiment.
        - Values close to 0 indicate neutral sentiment.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: -0.5

    ContentSentimentMax:
      type: number
      format: float
      minimum: -1.0
      maximum: 1.0
      description: |
        Filters articles based on the maximum sentiment score of their content.

        Range is `-1.0` to `1.0`, where:
        - Negative values indicate negative sentiment.
        - Positive values indicate positive sentiment.
        - Values close to 0 indicate neutral sentiment.

        To learn more, see [NLP features](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/nlp-features).
      example: 0.5

    IptcTags:
      oneOf:
        - type: string
          example: "20000199,20000209"
        - type: array
          items:
            type: string
          example: ["20000199", "20000209"]
      description: |
        Filters articles based on International Press Telecommunications Council (IPTC) media topic tags. To specify multiple IPTC tags, use a comma-separated string or an array of strings. 

        **Note**: The `iptc_tags` parameter is only available in the `v3_nlp_iptc_tags` subscription plan.

        To learn more, see [IPTC Media Topic NewsCodes](https://www.iptc.org/std/NewsCodes/treeview/mediatopic/mediatopic-en-GB.html).

    NotIptcTags:
      oneOf:
        - type: string
          example: "20000205, 20000209"
        - type: array
          items:
            type: string
          example: ["20000205", "20000209"]
      description: |
        Inverse of the `iptc_tags` parameter. Excludes articles based on International Press Telecommunications Council (IPTC) media topic tags. To specify multiple IPTC tags to exclude, use a comma-separated string or an array of strings. 

        **Note**: The `not_iptc_tags` parameter is only available in the `v3_nlp_iptc_tags` subscription plan.

        To learn more, see [IPTC Media Topic NewsCodes](https://www.iptc.org/std/NewsCodes/treeview/mediatopic/mediatopic-en-GB.html).

    IabTags:
      oneOf:
        - type: string
          example: "Business,Events"
        - type: array
          items:
            type: string
          example: ["Business", "Events"]
      description: |
        Filters articles based on Interactive Advertising Bureau (IAB) content categories.These tags provide a standardized taxonomy for digital advertising content categorization. To specify multiple IAB categories, use a comma-separated string or an array of strings.

        **Note**: The `iab_tags` parameter is only available in the `v3_nlp_iptc_tags` subscription plan.

        To learn more, see the [IAB Content taxonomy](https://iabtechlab.com/standards/content-taxonomy/).

    NotIabTags:
      oneOf:
        - type: string
          example: "Agriculture,Metals"
        - type: array
          items:
            type: string
          example: ["Agriculture", "Metals"]
      description: |
        Inverse of the `iab_tags` parameter. Excludes articles based on Interactive Advertising Bureau (IAB) content categories. These tags provide a standardized taxonomy for digital advertising content categorization. To specify multiple IAB categories to exclude, use a comma-separated string or an array of strings. 

        **Note**: The `not_iab_tags` parameter is only available in the `v3_nlp_iptc_tags` subscription plan.

        To learn more, see the [IAB Content taxonomy](https://iabtechlab.com/standards/content-taxonomy/).

    CustomTags:
      oneOf:
        - type: string
          example: "Tag1,Tag2"
        - type: array
          items:
            type: string
          example: ["Tag1", "Tag2"]
      description: |
        Filters articles based on provided taxonomy that is tailored to your specific needs and is accessible only with your API key. To specify tags, use the following pattern: 

        - `custom_tags.taxonomy=Tag1,Tag2`, where `taxonomy` is the taxonomy name and `Tag1,Tag2` are comma-separated tag names. For POST requests, you can also specify tags as an array of strings.

        To learn more, see the [Custom tags](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/custom-tags).

    ExcludeDuplicates:
      type: boolean
      description: |
        If true, excludes duplicate and highly similar articles from the search results. If false, returns all relevant articles, including duplicates. 

        To learn more, see [Articles deduplication](https://www.newscatcherapi.com/docs/news-api/guides-and-concepts/articles-deduplication).
      example: true

    When:
      type: string
      default: 7d
      description: |
        The time period for which you want to get the latest headlines.

        Format examples:
        - `7d`: Last seven days
        - `30d`: Last 30 days
        - `1h`: Last hour
        - `24h`: Last 24 hours
      example: 7d

    IsOpinion:
      type: boolean
      description: |
        If true, returns only opinion pieces. If false, excludes opinion-based articles and returns news only.
      example: true

    IsPaidContent:
      type: boolean
      description: |
        Filters articles by content completeness.

        If false, returns only articles for which full-text content is publicly available. If true, returns all indexed articles, including those where only partial content is publicly available (e.g., headlines, summaries, or preview paragraphs from paywalled sources).

        **Note**: NewsCatcher indexes content that is publicly accessible and available for crawling in accordance with publisher access controls (e.g., robots.txt and similar mechanisms). For paywalled sources, only content that publishers make publicly available (such as headlines, summaries, or preview text) is indexed. NewsCatcher does not bypass paywalls, authentication systems, or other technical access restrictions.
      example: false

    Links:
      oneOf:
        - type: string
          example: "https://nytimes.com/article1, https://bbc.com/article2"
        - type: array
          items:
            type: string
          example: ["https://nytimes.com/article1", "https://bbc.com/article2"]
      description: |
        The article link or list of article links to search for. To specify multiple links, use a comma-separated string or an array of strings.

        **Caution**: You can use either the `links` or the `ids` parameter, but not both at the same time.
      example: https://nytimes.com/article1

    Ids:
      oneOf:
        - type: string
          example: "5f8d0d55b6e45e00179c6e7e,5f8d0d55b6e45e00179c6e7f"
        - type: array
          items:
            type: string
          example: ["5f8d0d55b6e45e00179c6e7e", "5f8d0d55b6e45e00179c6e7f"]
      description: |
        The Newscatcher article ID (corresponds to the `_id` field in API response) or a list of article IDs to search for. To specify multiple IDs, use a comma-separated string or an array of strings.

        **Caution**: You can use either the `links` or the `ids` parameter, but not both at the same time.

    NerName:
      type: string
      description: |
        The name of person, organization, location, product or other named entity to search for. To specify multiple names use a comma-separated string. 

        Example: `"Tesla, Amazon"`
      example: Tesla,Amazon

    IncludeAdditionalInfo:
      type: boolean
      description: |
        If true, returns the following additional datapoints about each news source:
        - `nb_articles_for_7d`: The number of articles published by the source in the last week.
        - `country`: Source country of origin.
        - `rank`: SEO rank.
        - `is_news_domain`: Boolean indicating if the source is a news domain.
        - `news_domain_type`: Type of news domain (e.g., "Original Content").
        - `news_type`: Category of news (e.g., "General News Outlets").
        - `robots_compliant`: Percentage of domain articles that comply with robots.txt scraping rules (0-100%).

      example: true

    SourceUrl:
      oneOf:
        - type: string
          example: "bbc.com,nytimes.com"
        - type: array
          items:
            type: string
          example: ["bbc.com", "nytimes.com"]
      description: |
        The domains of the news publication to search for. To specify multiple news sources, 
        use a comma-separated string or an array of strings.

        **Caution**:  When specifying the `source_url` parameter, you can only use `include_additional_info` as an extra parameter.
      example: bbc.com

    AggregationBy:
      type: string
      enum:
        - day
        - hour
        - month
      description: |
        The aggregation interval for the results.
      default: day

    NewsDomainType:
      type: string
      enum:
        - Original Content
        - Aggregator
        - Press Releases
        - Republisher
        - Other
      description: |
        Filters results based on the news domain type. Possible values are:
        - `Original Content`: Sources that produce their own content.
        - `Aggregator`: Sources that collect content from various other sources.
        - `Press Releases`: Sources primarily publishing press releases.
        - `Republisher`: Sources that republish content from other sources.
        - `Other`: Sources that don't fit into main categories.
      example: "Original Content"

    NewsType:
      oneOf:
        - type: string
          example: "General News Outlets,Tech News and Updates"
        - type: array
          items:
            type: string
          example: ["General News Outlets", "Tech News and Updates"]
      description: |
        Filters results based on the news type. Multiple types can be specified using a comma-separated string or an array of strings.

        For a complete list of available news types, see [Enumerated parameters > News type](https://www.newscatcherapi.com/docs/news-api/api-reference/enumerated-parameters#news-type-news-type).

    AdditionalDomainInfo:
      type: boolean
      description: |
        If true, includes additional domain information in the response for each article:
        - `is_news_domain`: Boolean indicating if the source is a news domain.
        - `news_domain_type`: Type of news domain (e.g., `"Original Content"`).
        - `news_type`: Category of news (e.g., `"News and Blogs"`).
      example: true

    IsNewsDomain:
      type: boolean
      description: |
        If true, filters results to include only news domains.
      example: true

    TopNArticles:
      type: integer
      minimum: 1
      maximum: 100
      default: 1
      description: |
        Controls the number of top articles to include for each breaking news event.

        **Important limitations**: 
        - Maximum value is 100.
        - The product of `top_n_articles` x `page_size` must not exceed 1,000 (total articles limit).
      example: 5

    RobotsCompliant:
      type: boolean
      description: |
        If true, returns only articles that comply with the publisher's robots.txt rules. If false, returns only articles that do not comply with robots.txt rules. If omitted, returns all articles regardless of compliance status.
      example: true

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-token
      description: |
        API Key to authenticate requests.

        To access the API, include your API key in the `x-api-token` header. 
        To obtain your API key, complete the [form](https://www.newscatcherapi.com/book-a-demo) or contact us directly.
