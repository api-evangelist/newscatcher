      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TitleSentimentMax'
    ClusteringVariable:
      name: clustering_variable
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ClusteringVariable'
    AllLinks:
      description: 'The complete URL(s) mentioned in the article. For multiple URLs, use a comma-separated string.


