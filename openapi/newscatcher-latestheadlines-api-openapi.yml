        $ref: '#/components/schemas/ByParseDate'
    AllLinksText:
      description: 'The text content of links mentioned in the article. Searches for links where the anchor text contains the specified terms. For multiple terms, use a comma-separated string.


        **Note**: When this parameter is used, the response includes the `all_links_data` field with detailed link information.


        To learn more, see [Search by URL](https://www.newscatcherapi.com/docs/news-api/how-to/search-by-url).

        '
      name: all_links_text
      in: query
      required: false
      schema:
        type: string
        example: Nvidia,Tesla
    IptcTags:
      description: "Filters articles based on International Press Telecommunications Council (IPTC) media topic tags. To specify multiple IPTC tags, use a comma-separated string of tag IDs. \n\n**Note**: The `iptc_tags` parameter is only available in the `v3_nlp_iptc_tags` subscription plan.\n\nTo learn more, see [IPTC Media Topic NewsCodes](https://www.iptc.org/std/NewsCodes/treeview/mediatopic/mediatopic-en-GB.html).\n"
      name: iptc_tags
      in: query
      required: false
      schema:
        type: string
        example: 20000199,20000209
    NotTheme:
      name: not_theme
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/NotTheme'
    HasNlp:
      name: has_nlp
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/HasNlp'
    ContentSentimentMin:
      name: content_sentiment_min
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ContentSentimentMin'
  responses:
    UnauthorizedError_2:
      description: Unauthorized - Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: The 'x-api-token' parameter has an invalid value. Please provide a valid API key.
            status_code: 401
            status: Unauthorized
    LatestHeadlinesAdvancedResponse:
      description: 'A successful response containing the latest headlines since the specified time with GeoNames location data. The response may include clustering information if enabled.

        '
      content:
        application/json:
          schema:
            oneOf:
            - allOf:
              - $ref: '#/components/schemas/ArticleSearchAdvancedResponseDto'
              title: Advanced Latest Headlines Response
            - allOf:
              - $ref: '#/components/schemas/ClusteringSearchAdvancedResponseDto'
              title: Clustered Advanced Latest Headlines Response
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Invalid date format
            status_code: 422
            status: Validation error
    LatestHeadlinesResponse:
      description: A successful response containing the latest headlines since the specified time. The response may include clustering information if enabled.
      content:
        application/json:
          schema:
            oneOf:
            - allOf:
              - $ref: '#/components/schemas/ArticleSearchResponseDto'
              title: Latest Headlines Response
              description: 'The response model for the `Latest headlines` request.

                '
            - allOf:
              - $ref: '#/components/schemas/ClusteringSearchResponseDto'
              title: Clustered Latest Headlines Response
    RequestTimeoutError:
      description: Request timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Request timed out after 30 seconds
            status_code: 408
            status: Request timeout
    RateLimitError:
      description: Too many requests - Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Max API requests concurrency reached
            status_code: 429
            status: Too many requests
    InternalServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: Internal Server Error
    UnauthorizedError:
      description: Unauthorized - Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: 'Invalid api key: INVALID_API_KEY'
            status_code: 401
            status: Unauthorized
    ForbiddenError:
      description: Forbidden - Server refuses action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Your plan request date range cannot be greater than 400 days
            status_code: 403
            status: Forbidden
    SearchResponse:
      description: A successful response containing articles that match the search criteria. When `clustering_enabled` is `true`, returns a Clustered Articles Response. Otherwise, returns a Search Response.
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/SearchResponseDto_2'
            - $ref: '#/components/schemas/ClusteredSearchResponseDto'
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Invalid JSON in request body
            status_code: 400
            status: Bad request
  requestBodies:
    LatestHeadlinesAdvancedRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LatestHeadlinesAdvancedRequestDto'
    LatestHeadlinesRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LatestHeadlinesRequestDto'
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-token
      description: "API Key to authenticate requests.\n\nTo access the API, include your API key in the `x-api-token` header. \nTo obtain your API key, complete the [form](https://www.newscatcherapi.com/book-a-demo) or contact us directly.\n"
externalDocs:
  description: Find out more about Local News API
  url: https://www.newscatcherapi.com/docs/local-news-api/get-started/introduction
